version: '3.8'

services:
  chatbot:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    container_name: sqa-chatbot
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sqa_db
      - AI_PLATFORM_API_KEY=${AI_PLATFORM_API_KEY}
      - AI_PLATFORM_BASE_URL=${AI_PLATFORM_BASE_URL}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: sqa-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sqa_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
